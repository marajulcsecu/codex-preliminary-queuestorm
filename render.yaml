# Render deployment blueprint (fallback).
# Railway does not need this file - it auto-detects Python.
# Render can use this for one-click deploy.

services:
  - type: web
    name: codex-preliminary-api
    runtime: python
    plan: free
    buildCommand: "pip install --upgrade pip && pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: 8000
      - key: LOG_LEVEL
        value: INFO
